<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Placement Intelligence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://kit.fontawesome.com/a2e0e6ad5f.js" crossorigin="anonymous"></script>
</head>
<body class="premium-bg fade-in">
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="glass-card p-5 text-center max-width-500">
      <h1 class="fw-bold mb-2">AI Placement Intelligence</h1>
      <p class="subtitle mb-4">Predict your placement outcome instantly</p>
      <form method="POST" class="text-start">
        <div class="form-floating mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-graduation-cap"></i></span>
          <input type="number" step="0.1" name="cgpa" class="form-control" id="cgpa" placeholder="CGPA" required>
          <label for="cgpa">CGPA</label>
        </div>
        <div class="form-floating mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-briefcase"></i></span>
          <input type="number" name="internship" class="form-control" id="internship" placeholder="Internship Months" required>
          <label for="internship">Internship Months</label>
        </div>
        <div class="form-floating mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-book"></i></span>
          <select name="course" class="form-select" id="course" required>
            <option>B.Tech</option>
            <option>MBA</option>
            <option>MCA</option>
          </select>
          <label for="course">Course</label>
        </div>
        <div class="form-floating mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-university"></i></span>
          <select name="tier" class="form-select" id="tier" required>
            <option>T1</option>
            <option>T2</option>
            <option>T3</option>
          </select>
          <label for="tier">Tier</label>
        </div>
        <div class="form-floating mb-4 input-group">
          <span class="input-group-text"><i class="fas fa-chart-line"></i></span>
          <select name="sentiment" class="form-select" id="sentiment" required>
            <option>Positive</option>
            <option>Neutral</option>
            <option>Negative</option>
          </select>
          <label for="sentiment">Market Sentiment</label>
        </div>
        <button class="btn btn-gradient w-100"><i class="fas fa-bolt"></i> Analyze Risk</button>
      </form>
    </div>
  </div>
</body>
</html>
