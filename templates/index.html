<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Placement Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1f3b4d, #0f2027);
}

/* Card */
.container {
    width: 380px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    color: white;
    margin-bottom: 10px;
}

p {
    color: #aaa;
    margin-bottom: 25px;
}

/* Input box */
.input-box {
    margin: 14px 0;
}

.input-box input,
.input-box select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

/* Placeholder color */
::placeholder {
    color: #bbb;
}

/* Dropdown FIX */
select {
    color: #ccc;
}

select option {
    color: black;
}

/* When selected */
select:valid {
    color: white;
}

/* Hover + focus */
input:focus, select:focus {
    background: rgba(255,255,255,0.18);
    transform: scale(1.02);
}

/* Button */
button {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00c6ff;
}

</style>
</head>

<body>

<div class="container">
    <h1>AI Placement Intelligence</h1>
    <p>Predict your placement outcome instantly</p>

    <form method="POST" action="/predict">

        <div class="input-box">
            <input type="number" step="0.1" name="cgpa" placeholder="Enter CGPA" required>
        </div>

        <div class="input-box">
            <input type="number" name="internship" placeholder="Internship Months" required>
        </div>

        <!-- Dropdown FIX -->
        <div class="input-box">
            <select name="course" required>
                <option value="" disabled selected>Choose Course</option>
                <option value="BTech">B.Tech</option>
                <option value="MTech">M.Tech</option>
                <option value="MBA">MBA</option>
            </select>
        </div>

        <div class="input-box">
            <select name="tier" required>
                <option value="" disabled selected>Choose College Tier</option>
                <option value="Tier1">Tier 1</option>
                <option value="Tier2">Tier 2</option>
                <option value="Tier3">Tier 3</option>
            </select>
        </div>

        <div class="input-box">
            <select name="sentiment" required>
                <option value="" disabled selected>Market Condition</option>
                <option value="Positive">Positive 📈</option>
                <option value="Neutral">Neutral 😐</option>
                <option value="Negative">Negative 📉</option>
            </select>
        </div>

        <button type="submit">Analyze Risk →</button>

    </form>
</div>

</body>
</html>
